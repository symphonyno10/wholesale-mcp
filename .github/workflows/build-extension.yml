name: Build Desktop Extension

on:
  push:
    tags:
      - 'v*'  # v1.4.0 같은 태그 푸시 시 자동 빌드

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller wholesale_mcp/server.py ^
            --onefile ^
            --name wholesale-mcp ^
            --hidden-import wholesale_mcp ^
            --hidden-import wholesale_mcp.site_executor ^
            --hidden-import wholesale_mcp.browser_engine ^
            --hidden-import wholesale_mcp.recipe_normalizer ^
            --hidden-import wholesale_mcp.recipe_schema

      - name: Assemble extension
        run: |
          mkdir dist\extension\server
          copy dist\wholesale-mcp.exe dist\extension\server\
          xcopy recipes dist\extension\server\recipes\ /E /I
          copy extension\manifest.json dist\extension\

      - name: Pack .mcpb
        run: |
          npx @anthropic-ai/mcpb pack dist/extension wholesale-mcp.mcpb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wholesale-mcp-windows
          path: wholesale-mcp.mcpb

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: wholesale-mcp.mcpb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
