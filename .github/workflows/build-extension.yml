name: Build Desktop Extension

on:
  push:
    tags:
      - 'v*'  # v1.4.0 같은 태그 푸시 시 자동 빌드

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\playwright-browsers

      - name: Build with PyInstaller (onedir — 설치 시 1회 해제, 이후 즉시 시작)
        run: |
          pyinstaller main.py --onedir --name wholesale-mcp `
            --paths src `
            --hidden-import wholesale_mcp `
            --hidden-import wholesale_mcp.server `
            --hidden-import wholesale_mcp.site_executor `
            --hidden-import wholesale_mcp.browser_engine `
            --hidden-import wholesale_mcp.recipe_normalizer `
            --hidden-import wholesale_mcp.recipe_schema `
            --hidden-import wholesale_mcp.db `
            --hidden-import mcp `
            --hidden-import mcp.server `
            --hidden-import mcp.server.fastmcp `
            --collect-all pydantic `
            --collect-all uvicorn `
            --collect-all playwright `
            --add-data "recipes;recipes" `
            --add-data "playwright-browsers;playwright-browsers"

      - name: Sync manifest version
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content extension/manifest.json) -replace '"version": ".*?"', "`"version`": `"$version`"" | Set-Content extension/manifest.json

      - name: Assemble extension
        run: |
          New-Item -ItemType Directory -Force -Path dist/extension/server
          Copy-Item -Recurse dist/wholesale-mcp/* dist/extension/server/
          Copy-Item extension/manifest.json dist/extension/

      - name: Pack .mcpb
        run: |
          $version = "${{ github.ref_name }}"
          npx @anthropic-ai/mcpb pack dist/extension "wholesale-mcp-${version}.mcpb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wholesale-mcp-windows
          path: wholesale-mcp-${{ github.ref_name }}.mcpb

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: wholesale-mcp-${{ github.ref_name }}.mcpb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
