name: Build Desktop Extension

on:
  push:
    tags:
      - 'v*'  # v1.4.0 같은 태그 푸시 시 자동 빌드

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller entry_point.py --onefile --name wholesale-mcp --hidden-import wholesale_mcp --hidden-import wholesale_mcp.server --hidden-import wholesale_mcp.site_executor --hidden-import wholesale_mcp.browser_engine --hidden-import wholesale_mcp.recipe_normalizer --hidden-import wholesale_mcp.recipe_schema --add-data "wholesale_mcp;wholesale_mcp" --add-data "recipes;recipes"

      - name: Assemble extension
        run: |
          New-Item -ItemType Directory -Force -Path dist/extension/server
          Copy-Item dist/wholesale-mcp.exe dist/extension/server/
          Copy-Item -Recurse recipes dist/extension/server/recipes
          Copy-Item extension/manifest.json dist/extension/

      - name: Pack .mcpb
        run: |
          npx @anthropic-ai/mcpb pack dist/extension wholesale-mcp.mcpb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wholesale-mcp-windows
          path: wholesale-mcp.mcpb

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: wholesale-mcp.mcpb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
